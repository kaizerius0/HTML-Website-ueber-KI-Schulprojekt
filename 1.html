<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Beschreibung meiner Webseite">
  <meta name="author" content="Dein Name">
  <title>Meine Webseite</title>

  <!-- Externes CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Internes CSS -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Über uns</a></li>
        <li><a href="#">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hauptinhalt -->
  <main>
    <section>
      <h1>Willkommen auf meiner Seite</h1>
      <p>Hier steht dein Inhalt.</p>
    </section>

    <article>
      <h2>Ein Artikel</h2>
      <p>Hier steht ein Artikel oder Blogbeitrag.</p>
    </article>

    <aside>
      <h3>Seitenleiste</h3>
      <p>Zusätzliche Informationen oder Links.</p>
    </aside>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Meine Webseite. Alle Rechte vorbehalten.</p>
  </footer>

  <!-- Externes JavaScript -->
  <script src="script.js"></script>

  <!-- Internes JavaScript -->
  <script>
    console.log("Seite geladen!");
  </script>

</body>
</html>
